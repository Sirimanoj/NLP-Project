services:
  - type: web
    name: graph-ir-api
    env: python
    plan: free
    autoDeploy: true
    buildCommand: pip install -r graph_ir_backend/requirements.txt
    startCommand: uvicorn graph_ir_backend.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: PYTHONUTF8
        value: "1"
      - key: GRAPH_IR_EMBEDDING_MODE
        value: "lite"
      - key: CORS_ORIGINS
        value: "*"
